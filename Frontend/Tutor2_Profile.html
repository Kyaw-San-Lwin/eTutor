<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="Css/Sidebar.css">
  <link rel="stylesheet" href="Css/Tutor_Profile.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-200 font-sans">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sidebar bg-white border-r">

      <!-- Logo -->
      <div class="logo-container">
        <img src="Images/KMD Logo.jpg">
        <h1 class="logo-text">College</h1>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-4 space-y-1 text-black">

        <a href="Student_Dashboard.html" class="nav-item">
          <i class="bi bi-tv"></i>
          <span class="menu-text">Dashboard</span>
        </a>

        <a href="Student_Profile.html" class="nav-item">
          <i class="bi bi-person-circle"></i>
          <span class="menu-text">Profile</span>
        </a>

        <a href="Edit_Profile.html" class="nav-item">
          <i class="bi bi-pencil-square"></i>
          <span class="menu-text">Edit Profile</span>
        </a>

        <a href="Tutor2_Profile.html" class="nav-item active">
          <i class="bi bi-person-fill"></i>
          <span class="menu-text">Tutor</span>
        </a>

        <a href="Meeting.html" class="nav-item">
          <i class="bi bi-camera-video"></i>
          <span class="menu-text">Meeting</span>
        </a>

        <a href="Messaging.html" class="nav-item">
          <i class="bi bi-chat-left-dots"></i>
          <span class="menu-text">Message</span>
        </a>

        <a href="Blog_Post.html" class="nav-item">
          <i class="bi bi-journal-text"></i>
          <span class="menu-text">Blog Post</span>
        </a>

        <a href="Document.html" class="nav-item">
          <i class="bi bi-upload"></i>
          <span class="menu-text">Document</span>
        </a>

        <a href="Comment.html" class="nav-item">
          <i class="bi bi-chat-left-dots"></i>
          <span class="menu-text">Comment</span>
        </a>

        <a href="Login.html" class="nav-item logout">
          <i class="bi bi-box-arrow-right"></i>
          <span class="menu-text">Logout</span>
        </a>

        <div class="last-login">
          <p>Last Login</p>
          <p>03/07/26</p>
        </div>

      </nav>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Profile Card -->
      <div class="profile-card">

        <h1 class="profile-title">Tutor Profile</h1>

        <!-- Profile Image -->
        <div class="profile-image-container">
          <img src="Images/profile 2.jpg" alt="Profile Image" class="profile-image">
        </div>

        <!-- Name -->
        <h2 class="profile-name">Moe Thant Oo</h2>

        <!-- Information Row -->
        <div class="info-grid">
          <div class="info-item">
            <p class="info-label">Phone Number</p>
            <p class="info-value">09123456789</p>
          </div>

          <div class="info-item">
            <p class="info-label">Email</p>
            <p class="info-value">example@gmail.com</p>
          </div>

          <div class="info-item">
            <p class="info-label">Subject</p>
            <p class="info-value">Enterprise Web Software Development</p>
          </div>
        </div>

        <!-- Department -->
        <div class="department">
          <p class="info-label">Department</p>
          <p class="info-value">Computing</p>
        </div>

      </div>

    </main>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
    <link rel="stylesheet" href="Css/Blog_Post.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/apiClient.js"></script>
    <script src="assets/js/core/authGuard.js"></script>
    <script src="assets/js/core/components.js"></script>
    <script src="assets/js/api/blog.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- MAIN CONTENT -->
        <main class="blog-main">

            <!-- CREATE BLOG -->
            <div class="blog-box">

                <div class="user-info">
                    <img src="Images/profile.jpg">
                    <h3>Yun Aeindary Oo</h3>
                </div>
                <textarea id="blogText" placeholder="Write your blog note here"></textarea>
                <div class="post-btn">
                    <button onclick="postBlog()">Post</button>
                    <button class="reset-btn" onclick="clearPosts()">Reset All</button>
                </div>

            </div>

            <!-- BLOG POSTS -->
            <div id="posts"></div>

        </main>

    </div>

<script>
  requireAuth();
  loadSidebar("student");

  async function refreshBlogs() {
    const res = await loadBlogs();
    if (!res || !res.success) return;
    const posts = res.data || [];
    renderPosts(posts);
  }

  function renderPosts(posts) {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    posts.forEach((post) => {
      const userName = post.user_name || "User";
      const createdAt = post.created_at || "";
      const postId = post.blog_id;

      container.innerHTML += `
        <div class="post-card">
          <div class="post-header">
            <img src="Images/profile.jpg">
            <div>
              <h2>${userName}</h2>
              <p>${post.user_id ?? ""}</p>
            </div>
          </div>
          <p class="post-text">${post.content}</p>
          <p class="post-time">${createdAt}</p>
          <div class="comment-box">
            <input id="comment-${postId}" placeholder="Write a comment...">
            <button onclick="submitComment(${postId})">Send</button>
          </div>
        </div>
      `;
    });
  }

  async function postBlog() {
    const text = document.getElementById("blogText").value.trim();
    if (text === "") return;
    const title = text.slice(0, 50) || "Blog Post";
    const res = await createBlog(title, text);
    if (res && res.success) {
      document.getElementById("blogText").value = "";
      refreshBlogs();
    }
  }

  async function submitComment(postId) {
    const input = document.getElementById(`comment-${postId}`);
    if (!input) return;
    const text = input.value.trim();
    if (text === "") return;
    const res = await createBlogComment(postId, text);
    if (res && res.success) {
      input.value = "";
    }
  }

  function clearPosts() {
    document.getElementById("blogText").value = "";
  }

  refreshBlogs();
</script>

</body>
</html>

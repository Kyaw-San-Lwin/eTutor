<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/Sidebar.css">
    <link rel="stylesheet" href="Css/Edit_Profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/tw-compat.css">
</head>

<body class="bg-gray-200 font-sans">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="Student_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="Student_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="Edit_Profile.html" class="nav-item active">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-fill"></i>
                    <span class="menu-text">Tutor</span>
                </a>

                <a href="Meeting.html" class="nav-item">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="Blog_Post.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="Document.html" class="nav-item">
                    <i class="bi bi-upload"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="Comment.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Comment</span>
                </a>

                <a href="Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>
        </aside>

        <!-- Main Content -->
        <main class="edit-main">

            <!-- Edit Profile Card -->
            <div class="edit-card">

                <h2 class="edit-title">Edit Profile</h2>

                <!-- Upload Photo -->
                <div class="photo-upload">
                    <div class="icon-container">
                        <i class="bi bi-camera"></i>
                        <span class="plus-icon">
                            <i class="bi bi-plus"></i>
                        </span>
                    </div>
                    <p>Upload Profile Photo</p>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your Email">
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label>Password</label>
                    <input type="text" placeholder="Enter your Phone Number">
                </div>

                <button class="save-btn">Save</button>

            </div>

            <!-- Change Password Card -->
            <div class="edit-card">

                <h2 class="edit-title">Change Password</h2>

                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Enter your New Password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Enter your Confirm Password">
                </div>

                <button class="save-btn">Save</button>

            </div>

        </main>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
    <link rel="stylesheet" href="Css/Edit_Profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/apiClient.js"></script>
    <script src="assets/js/core/authGuard.js"></script>
    <script src="assets/js/core/components.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- Main Content -->
        <main class="edit-main">

            <!-- Edit Profile Card -->
            <div class="edit-card">

                <h2 class="edit-title">Edit Profile</h2>

                <!-- Upload Photo -->
                <div class="photo-upload">
                    <div class="icon-container">
                        <i class="bi bi-camera"></i>
                        <span class="plus-icon">
                            <i class="bi bi-plus"></i>
                        </span>
                    </div>
                    <p>Upload Profile Photo</p>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="editEmail">Email</label>
                    <input id="editEmail" type="email" placeholder="Enter your Email">
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label for="editPhone">Phone Number</label>
                    <input id="editPhone" type="text" placeholder="Enter your Phone Number">
                </div>

                <button class="save-btn">Save</button>

            </div>

            <!-- Change Password Card -->
            <div class="edit-card">

                <h2 class="edit-title">Change Password</h2>

                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input id="newPassword" type="password" placeholder="Enter your New Password">
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Enter your Confirm Password">
                </div>

                <button class="save-btn">Save</button>

            </div>

        </main>

    </div>

    <script>
        requireAuth();
        loadSidebar("student");
    </script>

</body>
</html>

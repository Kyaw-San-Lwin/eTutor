            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="Student_Dashboard.html" class="nav-item">

                <a href="Student_Profile.html" class="nav-item">

                <a href="Edit_Profile.html" class="nav-item">

                <a href="Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-fill"></i>
                    <span class="menu-text">Tutor</span>
                </a>

                <a href="Meeting.html" class="nav-item">

                <a href="Messaging.html" class="nav-item active">

                <a href="Document.html" class="nav-item">
                    <i class="bi bi-upload"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="Comment.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Comment</span>
                </a>

                <a href="Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex flex-1">

        <!-- CHAT LIST -->
        <div class="w-80 bg-white border-r">
            <div class="p-4 border-b">
                <h2 class="text-xl font-semibold">Messaging</h2>
            </div>
            <div class="p-4">
                <input type="text" placeholder="Search..." class="w-full p-2 bg-gray-100 rounded-lg">
            </div>
            <div class="p-4 flex items-center gap-3 bg-gray-100">
                <img src="Images/profile.jpg" class="w-12 h-12 rounded-full">
                <div>
                    <p class="font-medium">Yun Aeindary Oo</p>
                    <p class="text-sm text-gray-500">Thank you very much...</p>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="flex-1 flex flex-col">

            <!-- CHAT HEADER -->
            <div class="flex items-center justify-between p-6 bg-white border-b">
                <div class="flex items-center gap-3">
                    <img src="Images/profile.jpg" class="w-12 h-12 rounded-full">
                    <div>
                        <p class="font-semibold">Yun Aeindary Oo</p>
                        <p class="text-green-500 text-sm">Online</p>
                    </div>
                </div>
                <div class="flex gap-5 text-xl text-gray-500">
                    <i class="bi bi-camera-video"></i>
                    <i class="bi bi-telephone"></i>
                    <i class="bi bi-grid"></i>
                </div>
            </div>

            <!-- CHAT BODY -->
            <div id="chatBody" class="flex-1 p-8 overflow-y-auto space-y-6">
                <!--Messages will appear here!-->
            </div>

            <!-- CHAT INPUT -->
            <div class="bg-white p-4 flex items-center gap-4 border-t">
                <input id="messageInput" type="text" placeholder="Type your message" class="flex-1 bg-gray-100 p-3 rounded-lg outline-none" />
                <button id="sendBtn" class="bg-blue-700 text-white px-5 py-3 rounded-lg">
                <i class="bi bi-send"></i>
                </button>
            </div>

        </div>

    </div>

<script>

    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const chatBody = document.getElementById('chatBody');

    sendBtn.addEventListener('click', () => {
    const messageText = messageInput.value.trim();
    if (messageText === '') return;

    // Create message container
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('flex', 'justify-end');

    const messageContent = document.createElement('div');
    messageContent.classList.add('bg-blue-800', 'text-white', 'px-6', 'py-3', 'rounded-xl', 'max-w-sm');
    messageContent.textContent = messageText;

    messageDiv.appendChild(messageContent);
    chatBody.appendChild(messageDiv);

    // Scroll to bottom
    chatBody.scrollTop = chatBody.scrollHeight;

    // Clear input
    messageInput.value = '';
    });

    // Optional: Send on Enter key
    messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendBtn.click();
    }
    });

</script>

</body>
</html>

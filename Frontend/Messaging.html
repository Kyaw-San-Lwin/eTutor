            <!-- Navigation -->

                    <span class="menu-text">Comment</span>

                <a href="Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <div class="d-flex flex-grow-1">

        <!-- CHAT LIST -->
        <div class="u-w-20rem bg-white border-end">
            <div class="p-4 border-bottom">
                <h2 class="u-text-xl fw-semibold">Messaging</h2>
            </div>
            <div class="p-4">
                <input type="text" placeholder="Search..." class="w-100 p-2 u-bg-gray-100 rounded">
            </div>
            <div class="p-4 d-flex align-items-center gap-3 u-bg-gray-100">
                <img src="Images/profile.jpg" class="u-w-3rem u-h-3rem rounded-circle">
                <div>
                    <p class="fw-medium">Yun Aeindary Oo</p>
                    <p class="u-text-sm u-text-gray-500">Thank you very much...</p>
                </div>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div class="flex-grow-1 d-flex flex-column">

            <!-- CHAT HEADER -->
            <div class="d-flex align-items-center justify-content-between p-6 bg-white border-bottom">
                <div class="d-flex align-items-center gap-3">
                    <img src="Images/profile.jpg" class="u-w-3rem u-h-3rem rounded-circle">
                    <div>
                        <p class="fw-semibold">Yun Aeindary Oo</p>
                        <p class="u-text-green-500 u-text-sm">Online</p>
                    </div>
                </div>
                <div class="d-flex gap-5 u-text-xl u-text-gray-500">
                    <i class="bi bi-camera-video"></i>
                    <i class="bi bi-telephone"></i>
                    <i class="bi bi-grid"></i>
                </div>
            </div>

            <!-- CHAT BODY -->
            <div id="chatBody" class="flex-grow-1 p-8 u-overflow-y-auto u-space-y-6">
                <!--Messages will appear here!-->
            </div>

            <!-- CHAT INPUT -->
            <div class="bg-white p-4 d-flex align-items-center gap-4 border-top">
                <input id="messageInput" type="text" placeholder="Type your message" class="flex-grow-1 u-bg-gray-100 p-3 rounded u-outline-none" />
                <button id="sendBtn" class="u-bg-blue-700 text-white px-5 py-3 rounded">
                <i class="bi bi-send"></i>
                </button>
            </div>

        </div>

    </div>

<script>

    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const chatBody = document.getElementById('chatBody');

    sendBtn.addEventListener('click', () => {
    const messageText = messageInput.value.trim();
    if (messageText === '') return;

    // Create message container
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('d-flex', 'justify-content-end');

    const messageContent = document.createElement('div');
    messageContent.classList.add('u-bg-blue-800', 'text-white', 'px-6', 'py-3', 'u-rounded-xl', 'u-max-w-sm');
    messageContent.textContent = messageText;

    messageDiv.appendChild(messageContent);
    chatBody.appendChild(messageDiv);

    // Scroll to bottom
    chatBody.scrollTop = chatBody.scrollHeight;

    // Clear input
    messageInput.value = '';
    });

    // Optional: Send on Enter key
    messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        sendBtn.click();
    }
    });

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
    <link rel="stylesheet" href="Css/Messaging.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/apiClient.js"></script>
    <script src="assets/js/core/authGuard.js"></script>
    <script src="assets/js/core/components.js"></script>
    <script src="assets/js/api/message.js"></script>
    <script src="assets/js/api/allocation.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- MAIN CONTENT -->
        <div class="d-flex flex-grow-1">

        <!-- CHAT LIST -->
        <div class="bg-white border-end" style="width:20rem;">
            <div class="p-4 border-bottom">
                <h2 class="fs-4 fw-semibold">Messaging</h2>
            </div>
            <div class="p-4">
                <input type="text" placeholder="Search..." class="w-100 p-2 bg-light rounded-2">
            </div>
            <div class="px-4 pb-3">
                <label class="form-label small text-secondary">Start new chat</label>
                <div class="d-flex gap-2">
                    <select id="contactSelect" class="form-select form-select-sm">
                        <option value="">Select user</option>
                    </select>
                    <input id="manualUserId" class="form-control form-control-sm" type="number" placeholder="User ID">
                    <button id="startChatBtn" class="btn btn-sm btn-primary">Chat</button>
                </div>
            </div>
            <div id="chatList" class="p-3 d-flex flex-column gap-2"></div>
        </div>

        <!-- CHAT AREA -->
        <div class="flex-grow-1 d-flex flex-column">

            <!-- CHAT HEADER -->
            <div class="d-flex align-items-center justify-content-between p-4 bg-white border-bottom">
                <div class="d-flex align-items-center gap-3">
                    <img src="Images/profile.jpg" class="rounded-circle" style="width:3rem;height:3rem;" alt="Profile">
                    <div>
                        <p id="chatHeaderName" class="fw-semibold mb-0">Select a chat</p>
                        <p id="chatHeaderStatus" class="text-success small mb-0"></p>
                    </div>
                </div>
                <div class="d-flex gap-5 fs-4 text-secondary">
                    <i class="bi bi-camera-video"></i>
                    <i class="bi bi-telephone"></i>
                    <i class="bi bi-grid"></i>
                </div>
            </div>

            <!-- CHAT BODY -->
            <div id="chatBody" class="flex-grow-1 p-4 overflow-y-auto">
                <!--Messages will appear here!-->
            </div>

            <!-- CHAT INPUT -->
            <div class="bg-white p-3 d-flex align-items-center gap-3 border-top">
                <input id="messageInput" type="text" placeholder="Type your message" class="form-control flex-grow-1" />
                <button id="sendBtn" class="btn btn-primary">
                <i class="bi bi-send"></i>
                </button>
            </div>

        </div>

    </div>

<script>
    requireAuth();
    loadSidebar("student");

    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('messageInput');
    const chatBody = document.getElementById('chatBody');
    const chatList = document.getElementById('chatList');
    const chatHeaderName = document.getElementById('chatHeaderName');
    const chatHeaderStatus = document.getElementById('chatHeaderStatus');
    const contactSelect = document.getElementById('contactSelect');
    const manualUserId = document.getElementById('manualUserId');
    const startChatBtn = document.getElementById('startChatBtn');

    let activeUserId = null;

    function getCurrentUserId() {
      const raw = Storage.get("user");
      if (!raw) return null;
      try {
        const user = JSON.parse(raw);
        return user && user.id ? Number(user.id) : null;
      } catch {
        return null;
      }
    }

    function getCurrentUserRole() {
      const raw = Storage.get("user");
      if (!raw) return null;
      try {
        const user = JSON.parse(raw);
        return user && user.role ? String(user.role) : null;
      } catch {
        return null;
      }
    }

    function renderChatList(messages) {
      const currentUserId = getCurrentUserId();
      const map = new Map();

      messages.forEach((m) => {
        const otherId = m.sender_id === currentUserId ? m.receiver_id : m.sender_id;
        const otherName = m.sender_id === currentUserId ? m.receiver_name : m.sender_name;
        if (!map.has(otherId)) {
          map.set(otherId, {
            user_id: otherId,
            user_name: otherName,
            last_message: m.message
          });
        }
      });

      chatList.innerHTML = "";
      map.forEach((u) => {
        const item = document.createElement("button");
        item.className = "btn text-start d-flex align-items-center gap-3 w-100 bg-light border-0 p-3 rounded-3";
        item.innerHTML = `
          <img src="Images/profile.jpg" class="rounded-circle" style="width:2.5rem;height:2.5rem;" alt="Profile">
          <div>
            <p class="fw-semibold mb-0">${u.user_name || "User"}</p>
            <p class="small text-secondary mb-0">${u.last_message || ""}</p>
          </div>
        `;
        item.addEventListener("click", () => {
          activeUserId = u.user_id;
          chatHeaderName.textContent = u.user_name || "User";
          chatHeaderStatus.textContent = "Active";
          loadConversation();
        });
        chatList.appendChild(item);
      });
    }

    function renderMessages(messages) {
      const currentUserId = getCurrentUserId();
      chatBody.innerHTML = "";
      messages.reverse().forEach((m) => {
        const isMine = m.sender_id === currentUserId;
        const messageDiv = document.createElement('div');
        messageDiv.className = isMine ? 'd-flex justify-content-end mb-3' : 'd-flex justify-content-start mb-3';
        const messageContent = document.createElement('div');
        messageContent.className = isMine
          ? 'bg-primary text-white px-4 py-3 rounded-3'
          : 'bg-light text-dark px-4 py-3 rounded-3';
        messageContent.style.maxWidth = '24rem';
        messageContent.textContent = m.message || '';
        messageDiv.appendChild(messageContent);
        chatBody.appendChild(messageDiv);
      });
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    async function loadConversation() {
      if (!activeUserId) return;
      const res = await loadMessages(activeUserId);
      if (!res || !res.length) {
        chatBody.innerHTML = "";
        return;
      }
      renderMessages(res);
    }

    async function loadChatList() {
      const res = await loadMessages();
      if (!res || !res.length) {
        chatList.innerHTML = "";
        return;
      }
      renderChatList(res);
      if (!activeUserId && res.length) {
        const currentUserId = getCurrentUserId();
        const first = res[0];
        activeUserId = first.sender_id === currentUserId ? first.receiver_id : first.sender_id;
        chatHeaderName.textContent = first.sender_id === currentUserId ? first.receiver_name : first.sender_name;
        chatHeaderStatus.textContent = "Active";
        loadConversation();
      }
    }

    async function loadContacts() {
      const role = getCurrentUserRole();
      contactSelect.innerHTML = '<option value="">Select user</option>';
      manualUserId.style.display = "none";

      if (role === "student") {
        const res = await loadMyTutor();
        if (res && res.success && res.data) {
          const tutor = res.data;
          const opt = document.createElement("option");
          opt.value = tutor.tutor_user_id;
          opt.textContent = tutor.tutor_user_name || `Tutor #${tutor.tutor_user_id}`;
          contactSelect.appendChild(opt);
        }
        return;
      }

      if (role === "tutor") {
        const res = await loadAssignedStudents();
        if (res && res.success && Array.isArray(res.data)) {
          res.data.forEach((s) => {
            const opt = document.createElement("option");
            opt.value = s.student_user_id;
            opt.textContent = s.student_user_name || `Student #${s.student_user_id}`;
            contactSelect.appendChild(opt);
          });
        }
        return;
      }

      manualUserId.style.display = "block";
    }

    startChatBtn.addEventListener("click", () => {
      const selected = Number(contactSelect.value || 0);
      const manual = Number(manualUserId.value || 0);
      const targetId = selected || manual;
      if (!targetId) return;
      activeUserId = targetId;
      const selectedLabel = contactSelect.options[contactSelect.selectedIndex]?.textContent;
      chatHeaderName.textContent = selectedLabel || `User #${targetId}`;
      chatHeaderStatus.textContent = "Active";
      loadConversation();
    });

    sendBtn.addEventListener('click', async () => {
      const messageText = messageInput.value.trim();
      if (messageText === '') return;

      const receiverId = activeUserId;
      if (!receiverId) return;
      const res = await sendMessage(receiverId, messageText);

      if (!res || !res.success) {
        return;
      }
      messageInput.value = '';
      loadConversation();
    });

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendBtn.click();
      }
    });

    loadChatList();
    loadContacts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
  <link rel="stylesheet" href="Css/Comment.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/core/apiClient.js"></script>
  <script src="assets/js/core/authGuard.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/api/documentComment.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- Main Content -->
        <main class="meeting-main flex-grow-1 p-4">
            <div id="commentList"></div>
        </main>
</div>

<script>
  requireAuth();
  loadSidebar("student");

  async function refreshComments() {
    const res = await loadDocumentComments();
    if (!res || !res.success) return;
    renderComments(res.data || []);
  }

  function renderComments(items) {
    const container = document.getElementById("commentList");
    container.innerHTML = "";
    items.forEach((c) => {
      container.innerHTML += `
        <div class="meeting-card">
          <div class="meeting-header">
            <div class="profile-info">
              <img src="Images/profile 2.jpg" alt="Tutor Profile" class="profile-pic">
              <div class="name-time">
                <span class="tutor-name">${c.tutor_user_name || "Tutor"}</span>
                <span class="dot">•</span>
                <span class="message-time">${c.created_at || ""}</span>
                <div class="meeting-tabs">
                  <button class="tab-btn active">Document</button>
                </div>
              </div>
            </div>
          </div>
          <div class="message-section">
            <p class="message-text">${c.comment || ""}</p>
          </div>
        </div>
      `;
    });
  }

  refreshComments();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
<link rel="stylesheet" href="Css/Document.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="assets/js/core/config.js"></script>
<script src="assets/js/core/storage.js"></script>
<script src="assets/js/core/apiClient.js"></script>
<script src="assets/js/core/authGuard.js"></script>
<script src="assets/js/core/components.js"></script>
<script src="assets/js/api/document.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- MAIN CONTENT -->
        <main class="doc-main">

            <!-- Upload Box -->
            <div class="upload-box">
                <h2>Upload Document</h2>
                <input type="text" id="fileName" placeholder="Enter file name">
                <input type="file" id="fileUpload">
                <button id="uploadBtn">Upload</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <select id="filter">
                <option>All</option>
                <option>PDF</option>
                <option>DOC</option>
                <option>PPT</option>
                </select>
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for a file by name or date">
            </div>

            <!-- Table -->
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Modified</th>
                    <th>Download</th>
                    <th>View</th>
                </tr>
                </thead>
                <tbody id="fileTable"></tbody>
            </table>

        </main>

    </div> 

<script>
  requireAuth();
  loadSidebar("student");

  let files = [];

  function extractName(path) {
    if (!path) return "";
    const parts = path.split("/");
    return parts[parts.length - 1] || path;
  }

  function displayFiles() {
    const table = document.getElementById("fileTable");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const filter = document.getElementById("filter").value.toLowerCase();
    table.innerHTML = "";

    files.forEach((file) => {
      const name = extractName(file.file_path);
      const date = file.uploaded_at || "";
      if (!name.toLowerCase().includes(search) && !date.includes(search)) return;
      if (filter !== "all" && !name.toLowerCase().endsWith(filter)) return;

      table.innerHTML += `
        <tr>
          <td class="file-name">${name}</td>
          <td>${date}</td>
          <td><a href="${file.file_path}" class="download-btn">Download</a></td>
          <td></td>
        </tr>
      `;
    });
  }

  async function refreshDocuments() {
    const res = await loadDocuments();
    if (!res || !res.success) return;
    files = res.data || [];
    displayFiles();
  }

  document.getElementById("uploadBtn").addEventListener("click", async function() {
    const fileInput = document.getElementById("fileUpload");
    const file = fileInput.files[0];
    if (!file) {
      alert("Please select a file");
      return;
    }
    const res = await uploadDocument(file);
    if (res && res.success) {
      document.getElementById("fileName").value = "";
      fileInput.value = "";
      refreshDocuments();
    }
  });

  document.getElementById("searchInput").addEventListener("keyup", displayFiles);
  document.getElementById("filter").addEventListener("change", displayFiles);

  refreshDocuments();
</script>

</body>
</html>

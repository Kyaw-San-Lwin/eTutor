<body class="bg-gray-200">

        <!-- SIDEBAR -->

            <!-- Logo -->

            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="Tutor2_Profile.html" class="nav-item">
                    <i class="bi bi-person-fill"></i>
                    <span class="menu-text">Tutor</span>
                </a>

                <a href="Meeting.html" class="nav-item">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>

                <a href="Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="Blog_Post.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>

                <a href="Document.html" class="nav-item active">

                <a href="Comment.html" class="nav-item">

                <a href="Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="doc-main">

            <!-- Upload Box -->
            <div class="upload-box">
                <h2>Upload Document</h2>
                <input type="text" id="fileName" placeholder="Enter file name">
                <input type="file" id="fileUpload">
                <button id="uploadBtn">Upload</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <select id="filter">
                <option>All</option>
                <option>PDF</option>
                <option>DOC</option>
                <option>PPT</option>
                </select>
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for a file by name or date">
            </div>

            <!-- Table -->
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Modified</th>
                    <th>Download</th>
                    <th>View</th>
                </tr>
                </thead>
                <tbody id="fileTable"></tbody>
            </table>

        </main>

    </div> 

<script>
    let files = JSON.parse(localStorage.getItem("files")) || [];
    
    // Preload example files if localStorage is empty
    if (files.length === 0) {
        files = [
            {
                name: "Sample Document.pdf",
                data: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf",
                date: "09/03/2026",
                view: false
            },
            {
                name: "Lecture Notes.docx",
                data: "https://file-examples-com.github.io/uploads/2017/02/file-sample_100kB.doc",
                date: "08/30/2026",
                view: false
            },
            {
                name: "Presentation.pptx",
                data: "https://file-examples-com.github.io/uploads/2017/08/file_example_PPT_250kB.ppt",
                date: "09/01/2026",
                view: false
            }
        ];

        localStorage.setItem("files", JSON.stringify(files));
    }
    /* Display Files */
    function displayFiles() {
        const table = document.getElementById("fileTable");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const filter = document.getElementById("filter").value.toLowerCase();

        table.innerHTML = "";

        files.forEach((file, index) => {
            // filter by name/date
            if (!file.name.toLowerCase().includes(search) && !file.date.includes(search)) return;
            // filter by type
            if (filter !== "all" && !file.name.toLowerCase().endsWith(filter)) return;

            table.innerHTML += `
                <tr>
                    <td class="file-name" onclick="viewFile(${index})">${file.name}</td>
                    <td>${file.date}</td>
                    <td><a href="${file.data}" download="${file.name}" class="download-btn">Download</a></td>
                    <td>${file.view ? '<i class="bi bi-eye"></i>' : ''}</td>
                </tr>
            `;
        });
    }

    /* Upload File */
    document.getElementById("uploadBtn").addEventListener("click", function() {
        const nameInput = document.getElementById("fileName").value.trim();
        const fileInput = document.getElementById("fileUpload");
        const file = fileInput.files[0];

        if (!nameInput || !file) {
            alert("Please enter a file name and select a file");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            files.push({
                name: nameInput,
                data: e.target.result,
                date: new Date().toLocaleDateString(),
                view: false
            });
            localStorage.setItem("files", JSON.stringify(files));
            displayFiles();

            // Reset inputs
            document.getElementById("fileName").value = "";
            fileInput.value = "";
        };
        reader.readAsDataURL(file);
    });

    /* View File */
    function viewFile(index) {
        files[index].view = true;
        localStorage.setItem("files", JSON.stringify(files));
        displayFiles();
    }

    /* Search functionality */
    document.getElementById("searchInput").addEventListener("keyup", displayFiles);
    document.getElementById("filter").addEventListener("change", displayFiles);

    /* Initial display */
    displayFiles();
</script>

</body>
</html>

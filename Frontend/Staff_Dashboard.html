<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/core/apiClient.js"></script>
  <script src="assets/js/core/authGuard.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/api/dashboard.js"></script>
</head>

<body class="bg-light">

  <div class="d-flex min-vh-100">

    <aside id="sidebar"></aside>

    <main class="flex-grow-1 p-4">
      <div class="container-fluid">
        <h1 class="h4 fw-semibold mb-4">Staff Dashboard</h1>
        <div class="row g-3">
          <div class="col-md-4">
            <div class="bg-white rounded-4 shadow-sm p-4">
              <div class="text-secondary small">Total Users</div>
              <div id="metricTotalUsers" class="fs-2 fw-bold">0</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="bg-white rounded-4 shadow-sm p-4">
              <div class="text-secondary small">Active Allocations</div>
              <div id="metricActiveAllocations" class="fs-2 fw-bold">0</div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="bg-white rounded-4 shadow-sm p-4">
              <div class="text-secondary small">Scheduled Meetings</div>
              <div id="metricScheduledMeetings" class="fs-2 fw-bold">0</div>
            </div>
          </div>
        </div>
      </div>
    </main>

  </div>

  <script>
    requireAuth();
    loadSidebar("staff");

    async function hydrateStaffDashboard() {
      const res = await loadDashboard();
      if (!res || !res.success) return;
      const metrics = (res.data && res.data.metrics) ? res.data.metrics : {};
      const totalUsers = metrics.total_users ?? 0;
      const activeAllocations = metrics.active_allocations ?? 0;
      const scheduledMeetings = metrics.scheduled_meetings ?? 0;
      document.getElementById("metricTotalUsers").textContent = totalUsers;
      document.getElementById("metricActiveAllocations").textContent = activeAllocations;
      document.getElementById("metricScheduledMeetings").textContent = scheduledMeetings;
    }

    hydrateStaffDashboard();
  </script>

</body>
</html>

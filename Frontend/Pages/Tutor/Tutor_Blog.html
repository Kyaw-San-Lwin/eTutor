<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Blog Posts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Blog_Post.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/blog-page.js"></script>
</head>

<body class="bg-gray-200" data-blog-role="tutor">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="./Tutor_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Student_List.html" class="nav-item">
                    <i class="bi bi-people-fill"></i>
                    <span class="menu-text">Students</span>
                </a>

                <a href="./Tutor_Meeting.html" class="nav-item">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="./Tutor_Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="./Tutor_Blog.html" class="nav-item active">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="./Tutor_Document.html" class="nav-item">
                    <i class="bi bi-file-earmark-arrow-down"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="blog-main">

            <!-- CREATE BLOG -->
            <div class="blog-box">

                <div class="user-info">
                    <img id="composerAvatar" src="../../Images/profile.jpg" alt="Profile photo">
                    <div>
                        <h3 id="composerName">Loading...</h3>
                        <p id="composerEmail"></p>
                    </div>
                </div>
                <textarea id="blogText" placeholder="Write your blog note here"></textarea>
                <p id="blogStatus" class="text-sm mt-3"></p>
                <div class="post-btn">
                    <button id="postBlogBtn" type="button">Post</button>
                    <button id="resetBlogDraftBtn" class="reset-btn" type="button">Clear Draft</button>
                </div>

            </div>

            <!-- BLOG POSTS -->
            <div id="posts"></div>

        </main>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Meeting.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/meeting-page.js"></script>
</head>

<body class="bg-gray-100 font-sans" data-meeting-role="tutor">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="./Tutor_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Student_List.html" class="nav-item">
                    <i class="bi bi-people-fill"></i>
                    <span class="menu-text">Students</span>
                </a>

                <a href="./Tutor_Meeting.html" class="nav-item active">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="./Tutor_Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="./Tutor_Blog.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="./Tutor_Document.html" class="nav-item">
                    <i class="bi bi-file-earmark-arrow-down"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="meeting-main flex-1 p-10">

            <!-- Upload Meeting Section -->
            <div class="meeting-upload">

                <label for="meetingStudent">Student</label>
                <select id="meetingStudent" class="w-full border rounded p-2 mb-3"></select>
                <label for="meetingDate">Meeting Date</label>
                <input id="meetingDate" type="date" class="w-full border rounded p-2 mb-3">
                <label for="meetingTime">Meeting Time</label>
                <input id="meetingTime" type="time" class="w-full border rounded p-2 mb-3">
                <label for="meetingType">Meeting Type</label>
                <select id="meetingType" class="w-full border rounded p-2 mb-3">
                    <option value="virtual">Virtual</option>
                    <option value="physical">Physical</option>
                </select>
                <label for="meetingName">Meeting Name</label>
                <input id="meetingName" type="text" class="w-full border rounded p-2 mb-3" placeholder="e.g. Weekly Progress Review">

                <div id="virtualFields">
                    <label for="meetingPlatform">Platform</label>
                    <input id="meetingPlatform" type="text" class="w-full border rounded p-2 mb-3" placeholder="Teams / Zoom / Meet">
                    <label for="meetingLink">Meeting Link</label>
                    <input id="meetingLink" type="url" class="w-full border rounded p-2 mb-3" placeholder="https://...">
                </div>

                <div id="physicalFields" style="display:none;">
                    <label for="meetingLocation">Meeting Location</label>
                    <input id="meetingLocation" type="text" class="w-full border rounded p-2 mb-3" placeholder="Room / Campus location">
                </div>

                <label for="meetingMessage">Meeting Note</label>
                <textarea id="meetingMessage" placeholder="Write meeting note..."></textarea>
                <p id="meetingStatus" class="text-sm mt-2"></p>

                <button id="postMeetingBtn" type="button" class="post-btn">
                    <i class="bi bi-upload"></i> Post Meeting
                </button>

            </div>

            <!-- Meeting Post Card -->
            <div id="meetingContainer"></div>

        </main>

</body>
</html>

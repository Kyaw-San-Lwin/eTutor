<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Tutor_Document.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-200">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="sidebar bg-white border-r">

            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="./Tutor_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Student_List.html" class="nav-item">
                    <i class="bi bi-people-fill"></i>
                    <span class="menu-text">Students</span>
                </a>

                <a href="./Tutor_Meeting.html" class="nav-item">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="./Tutor_Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="./Tutor_Blog.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="./Tutor_Document.html" class="nav-item active">
                    <i class="bi bi-file-earmark-arrow-down"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="doc-main">

            <div class="search-bar">
                <select id="filter">
                    <option>All</option>
                    <option>PDF</option>
                    <option>DOC</option>
                    <option>PPT</option>
                </select>

                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search for a file by name or date">
            </div>

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Document</th>
                        <th>Modified</th>
                        <th>Download</th>
                        <th>View</th>
                    </tr>
                </thead>

                <tbody id="fileTable"></tbody>

            </table>

        </main>

        <!-- STUDENT PROFILE PANEL -->
        <div id="studentProfile" class="student-profile">

            <div class="profile-card">
                <img src="../../Images/profile.jpg">
                <h3 id="studentName">Student Name</h3>
                <button onclick="goMessage()" class="message-btn">
                    <i class="bi bi-chat-dots"></i>
                </button>
            </div>

        </div>

    </div>

<script>

    /* Default file list */
    const defaultFiles = [

        {
            student:"Yun Aeindary Oo",
            name:"Sample Document.pdf",
            data:"https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf",
            date:"09/03/2026",
            view:false
        },

        {
            student:"Hnin Yati",
            name:"Lecture Notes.docx",
            data:"https://file-examples.com/wp-content/uploads/2017/02/file-sample_100kB.doc",
            date:"08/30/2026",
            view:false
        },

        {
            student:"Tunn Lin Naing",
            name:"Presentation.pptx",
            data:"https://file-examples.com/wp-content/uploads/2017/08/file_example_PPT_250kB.ppt",
            date:"09/01/2026",
            view:false
        }

    ];

    /* Load saved files */
    let files = JSON.parse(localStorage.getItem("files"));

    /* If no data OR old data without student field */
    if(!files || !files[0].student){

        files = defaultFiles;
        localStorage.setItem("files",JSON.stringify(files));

    }

    /* Display files */
    function displayFiles(){

        const table = document.getElementById("fileTable");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const filter = document.getElementById("filter").value.toLowerCase();

        table.innerHTML="";

            files.forEach((file,index)=>{

                if(!file.name.toLowerCase().includes(search) && !file.date.includes(search)) return;
                if(filter!=="all" && !file.name.toLowerCase().endsWith(filter)) return;

                table.innerHTML += `

                    <tr>
                        <td class="student-name" onclick="openProfile('${file.student}')">${file.student}</td>
                        <td class="file-name" onclick="viewFile(${index})">${file.name}</td>
                        <td>${file.date}</td>
                        <td>
                            <a href="${file.data}" download="${file.name}" class="download-btn">
                            Download
                            </a>
                        </td>
                        <td>${file.view ? '<i class="bi bi-eye"></i>' : ''}</td>
                    </tr>

                `;

            });

    }

    /* Mark viewed */
    function viewFile(index){
        files[index].view=true;
        localStorage.setItem("files",JSON.stringify(files));
        displayFiles();
    }

    /* Search events */
    document.getElementById("searchInput").addEventListener("keyup",displayFiles);
    document.getElementById("filter").addEventListener("change",displayFiles);

    /* Open profile */
    function openProfile(name){
        document.getElementById("studentName").innerText=name;
        document.getElementById("studentProfile").classList.add("show");
    }

    /* Message button */
    function goMessage(){
        window.location.href="./Tutor_Messaging.html";
    }

    /* Close profile */
    document.addEventListener("click",function(e){

        const panel=document.getElementById("studentProfile");

        if(!panel.contains(e.target) && !e.target.classList.contains("student-name")){
            panel.classList.remove("show");
        }

    });

    displayFiles();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exception Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/staff-permissions-page.js"></script>
    <script src="../../assets/js/features/exception-report-page.js"></script>
</head>
<body class="bg-gray-100 font-sans" data-admin-page="1">
    <div class="flex min-h-screen">
        <aside class="sidebar bg-white border-r">
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg" alt="Logo">
                <h1 class="logo-text">College</h1>
            </div>
            <nav class="flex-1 p-4 space-y-1 text-black">
                <a href="./Staff_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i><span class="menu-text">Dashboard</span>
                </a>
                <a href="./Create_user.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i><span class="menu-text">Create Account</span>
                </a>
                <a href="./Student_List.html" class="nav-item">
                    <i class="bi bi-person"></i><span class="menu-text">Students</span>
                </a>
                <a href="./Tutor_List.html" class="nav-item">
                    <i class="bi bi-person-badge"></i><span class="menu-text">Tutors</span>
                </a>
                <a href="./Exception_Report.html" class="nav-item active">
                    <i class="bi bi-exclamation-triangle"></i><span class="menu-text">Exception Report</span>
                </a>
                <a href="./Statistical_Report.html" class="nav-item">
                    <i class="bi bi-bar-chart-line"></i><span class="menu-text">Statistical Report</span>
                </a>
                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i><span class="menu-text">Logout</span>
                </a>
                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <h1 class="text-2xl font-bold mb-2">Exception Report</h1>
            <p id="reportStatus" class="text-sm mb-4"></p>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <section class="bg-white rounded-lg shadow p-4">
                    <h2 class="font-semibold mb-3">Students Without Personal Tutor</h2>
                    <ul id="studentsWithoutTutorList" class="text-sm text-gray-700"></ul>
                </section>

                <section class="bg-white rounded-lg shadow p-4">
                    <h2 class="font-semibold mb-3">Inactive 7 Days</h2>
                    <ul id="inactive7DaysList" class="text-sm text-gray-700"></ul>
                </section>

                <section class="bg-white rounded-lg shadow p-4">
                    <h2 class="font-semibold mb-3">Inactive 28 Days</h2>
                    <ul id="inactive28DaysList" class="text-sm text-gray-700"></ul>
                </section>
            </div>
        </main>
    </div>

</html>

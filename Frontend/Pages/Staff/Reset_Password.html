<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Reset_Password.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/core/toast.js"></script>
    <script src="../../assets/js/features/staff-permissions-page.js"></script>
    <script src="../../assets/js/features/reset-password-page.js"></script>
</head>

<body class="bg-gray-100 font-sans" data-admin-page="1">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="./Staff_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Staff_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Create_user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span class="menu-text">Create Account</span>
                </a>

                <a href="./Reset_Password.html" class="nav-item active">
                    <i class="bi bi-key"></i>
                    <span class="menu-text">Reset Password</span>
                </a>

                <!-- USERS DROPDOWN -->
                <div class="dropdown">
                    <div class="nav-item dropdown-toggle">
                        <i class="bi bi-people-fill"></i>
                        <span class="menu-text">Users</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>

                    <div class="dropdown-menu">
                        <a href="./Student_List.html">
                        <i class="bi bi-person"></i>
                        <span class="menu-text">Students</span>
                        </a>
                        <a href="./Tutor_List.html">
                        <i class="bi bi-person-badge"></i>
                        <span class="menu-text">Tutors</span>
                        </a>
                    </div>
                </div>
                
                <!-- PERSONAL TUTOR DROPDOWN -->
                <div class="dropdown">
                    <div class="nav-item dropdown-toggle">
                        <i class="bi bi-chat-left-dots"></i>
                        <span class="menu-text">Personal Tutor</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>
                    
                    <div class="dropdown-menu">
                        <a href="./Allocation.html">
                        <i class="bi bi-diagram-3"></i>
                        <span class="menu-text">Tutor Allocation</span>
                        </a>
                        <a href="./Reallocation.html">
                        <i class="bi bi-arrow-repeat"></i>
                        <span class="menu-text">Tutor Reallocation</span>
                        </a>
                    </div>
                </div>

                <div id="admin-reports-placeholder"></div>
                
                <a href="./Blog_Post.html" class="nav-item" data-admin-only>
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>
                
                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>
                
                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>
                
            </nav>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <div class="reset-card">

                <!-- Title -->
                <div class="text-center mb-6">
                    <h1 class="title">
                        <img src="../../Images/KMD Logo.jpg" class="logo-img"> College
                    </h1>
                    <p class="subtitle">Reset your password</p>
                </div>

                <!-- Form -->
                <form id="resetForm" autocomplete="off">

                    <!-- Username/Email -->
                    <div class="form-group">
                        <label>Username or Email</label>
                        <input id="resetLogin" type="text" placeholder="Enter your Username or Email" autocomplete="off" required>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label>New Password</label>
                        <input id="resetNewPassword" type="password" placeholder="Enter new password" autocomplete="new-password" minlength="8" required>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input id="resetConfirmPassword" type="password" placeholder="Re-enter password" autocomplete="new-password" minlength="8" required>
                    </div>

                    <div class="form-group">
                        <label class="password-toggle-row">
                            <input id="toggleResetPasswords" type="checkbox">
                            <span>Show passwords</span>
                        </label>
                    </div>

                    <p id="resetStatus" class="text-sm mt-2"></p>

                    <!-- Button -->
                    <button id="resetSubmitBtn" type="submit" class="submit-btn">
                        Reset Password <i class="bi bi-arrow-repeat"></i>
                    </button>

                </form>

            </div>

        </main>

    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Edit_Profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/staff-permissions-page.js"></script>
    <script src="../../assets/js/features/edit-profile-page.js"></script>
</head>

<body class="bg-gray-200 font-sans" data-profile-mode="staff-edit">

    <div class="flex min-h-screen">

        <aside class="sidebar bg-white border-r">
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <nav class="flex-1 p-4 space-y-1 text-black">
                <a href="./Staff_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Staff_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item active">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Create_user.html" class="nav-item">
                    <i class="bi bi-person-plus"></i>
                    <span class="menu-text">Create Account</span>
                </a>

                <a href="./Reset_Password.html" class="nav-item">
                    <i class="bi bi-key"></i>
                    <span class="menu-text">Reset Password</span>
                </a>

                <div class="dropdown">
                    <div class="nav-item dropdown-toggle">
                        <i class="bi bi-people-fill"></i>
                        <span class="menu-text">Users</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>

                    <div class="dropdown-menu">
                        <a href="./Student_List.html">
                            <i class="bi bi-person"></i>
                            <span class="menu-text">Students</span>
                        </a>
                        <a href="./Tutor_List.html">
                            <i class="bi bi-person-badge"></i>
                            <span class="menu-text">Tutors</span>
                        </a>
                    </div>
                </div>

                <div class="dropdown">
                    <div class="nav-item dropdown-toggle">
                        <i class="bi bi-chat-left-dots"></i>
                        <span class="menu-text">Personal Tutor</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>

                    <div class="dropdown-menu">
                        <a href="./Allocation.html">
                            <i class="bi bi-diagram-3"></i>
                            <span class="menu-text">Tutor Allocation</span>
                        </a>
                        <a href="./Reallocation.html">
                            <i class="bi bi-arrow-repeat"></i>
                            <span class="menu-text">Tutor Reallocation</span>
                        </a>
                    </div>
                </div>

                <a href="./Blog_Post.html" class="nav-item" data-admin-only>
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>
            </nav>
        </aside>

        <main class="edit-main">
            <div class="edit-card">
                <h2 class="edit-title">Edit Profile</h2>

                <div class="photo-upload">
                    <div class="icon-container">
                        <div class="profile-circle">
                            <i class="bi bi-camera" id="defaultIcon"></i>
                            <img id="profilePreview" src="" style="display:none;">
                        </div>

                        <label for="uploadImage" class="plus-icon">
                            <i class="bi bi-plus"></i>
                        </label>
                    </div>

                    <p>Upload Profile Photo</p>
                    <input type="file" id="uploadImage" accept="image/*">
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input id="profileFullName" type="text" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Department</label>
                    <input id="profileDepartmentInput" type="text" placeholder="Enter your department">
                </div>

                <p id="profileEditMessage" class="text-sm mt-2"></p>
                <button id="profileSaveBtn" class="save-btn">Save</button>
            </div>

            <div class="edit-card" id="passwordChange">
                <h2 class="edit-title">Change Password</h2>

                <div class="input-group">
                    <label>Old Password</label>
                    <input id="currentPassword" type="password" placeholder="Enter your old password">
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input id="newPassword" type="password" placeholder="Enter your new password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Confirm your new password">
                </div>

                <p id="passwordChangeMessage" class="text-sm mt-2"></p>
                <button id="passwordSaveBtn" class="save-btn">Save</button>
            </div>
        </main>
    </div>

</body>
</html>

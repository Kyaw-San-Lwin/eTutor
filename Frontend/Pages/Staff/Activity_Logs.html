<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/staff-permissions-page.js"></script>
    <script src="../../assets/js/features/activity-logs-page.js"></script>
</head>
<body class="bg-gray-100 font-sans" data-admin-page="1">
    <div class="flex min-h-screen">
        <aside class="sidebar bg-white border-r">
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg" alt="Logo">
                <h1 class="logo-text">College</h1>
            </div>
            <nav class="flex-1 p-4 space-y-1 text-black">
                <a href="./Staff_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i><span class="menu-text">Dashboard</span>
                </a>
                <a href="./Create_user.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i><span class="menu-text">Create Account</span>
                </a>
                <a href="./Exception_Report.html" class="nav-item">
                    <i class="bi bi-exclamation-triangle"></i><span class="menu-text">Exception Report</span>
                </a>
                <a href="./Statistical_Report.html" class="nav-item">
                    <i class="bi bi-bar-chart-line"></i><span class="menu-text">Statistical Report</span>
                </a>
                <a href="./Activity_Logs.html" class="nav-item active">
                    <i class="bi bi-clock-history"></i><span class="menu-text">Activity Logs</span>
                </a>
                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i><span class="menu-text">Logout</span>
                </a>
                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <h1 class="text-2xl font-bold mb-2">Activity Logs</h1>
            <p id="activityLogStatus" class="text-sm mb-3"></p>

            <section class="bg-white rounded-lg shadow p-4 mb-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Activity Type</label>
                        <input id="activityTypeInput" type="text" class="w-full border rounded p-2" placeholder="API access">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Limit</label>
                        <input id="limitInput" type="number" min="1" max="500" value="20" class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Offset</label>
                        <input id="offsetInput" type="number" min="0" value="0" class="w-full border rounded p-2">
                    </div>
                    <div class="flex items-end">
                        <button id="applyFilterBtn" class="bg-blue-700 text-white px-4 py-2 rounded">Apply</button>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow p-4 mb-4">
                <div class="text-sm text-gray-700">
                    Total: <span id="summaryTotal">0</span>,
                    Limit: <span id="summaryLimit">0</span>,
                    Offset: <span id="summaryOffset">0</span>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow p-4">
                <table class="w-full text-left text-sm">
                    <thead class="border-b text-gray-500">
                        <tr>
                            <th class="py-2">Log ID</th>
                            <th>User</th>
                            <th>Activity</th>
                            <th>Page</th>
                            <th>IP</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="activityLogRows"></tbody>
                </table>
            </section>
        </main>
    </div>
</body>
</html>

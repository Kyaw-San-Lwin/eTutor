<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../../Css/Sidebar.css">
  <link rel="stylesheet" href="../../Css/Register.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="../../assets/js/core/config.js"></script>
  <script src="../../assets/js/core/storage.js"></script>
  <script src="../../assets/js/core/apiClient.js"></script>
  <script src="../../assets/js/core/auth.js"></script>
  <script src="../../assets/js/features/staff-permissions-page.js"></script>
  <script src="../../assets/js/features/create-user-page.js"></script>
</head>

<body class="bg-gray-100 font-sans">

  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="sidebar bg-white border-r">

      <!-- Logo -->
      <div class="logo-container">
        <img src="../../Images/KMD Logo.jpg">
        <h1 class="logo-text">College</h1>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-4 space-y-1 text-black">

        <a href="./Staff_Dashboard.html" class="nav-item">
          <i class="bi bi-tv"></i>
          <span class="menu-text">Dashboard</span>
        </a>

        <a href="./Staff_Profile.html" class="nav-item">
          <i class="bi bi-person-circle"></i>
          <span class="menu-text">Profile</span>
        </a>

        <a href="./Edit_Profile.html" class="nav-item">
          <i class="bi bi-pencil-square"></i>
          <span class="menu-text">Edit Profile</span>
        </a>

        <a href="./Create_user.html" class="nav-item active">
          <i class="bi bi-person-plus"></i>
          <span class="menu-text">Create Account</span>
        </a>
        
        <a href="./Reset_Password.html" class="nav-item">
          <i class="bi bi-key"></i>
          <span class="menu-text">Reset Password</span>
        </a>

        <!-- USERS DROPDOWN -->
        <div class="dropdown">
          <div class="nav-item dropdown-toggle">
            <i class="bi bi-people-fill"></i>
            <span class="menu-text">Users</span>
            <i class="bi bi-chevron-down arrow"></i>
          </div>

          <div class="dropdown-menu">
            <a href="./Student_List.html">
              <i class="bi bi-person"></i>
              <span class="menu-text">Students</span>
            </a>
            <a href="./Tutor_List.html">
              <i class="bi bi-person-badge"></i>
              <span class="menu-text">Tutors</span>
            </a>
          </div>
        </div>
          
        <!-- PERSONAL TUTOR DROPDOWN -->
        <div class="dropdown">
          <div class="nav-item dropdown-toggle">
            <i class="bi bi-chat-left-dots"></i>
            <span class="menu-text">Personal Tutor</span>
            <i class="bi bi-chevron-down arrow"></i>
          </div>
          
          <div class="dropdown-menu">
            <a href="./Allocation.html">
              <i class="bi bi-diagram-3"></i>
              <span class="menu-text">Tutor Allocation</span>
            </a>
            <a href="./Reallocation.html">
              <i class="bi bi-arrow-repeat"></i>
              <span class="menu-text">Tutor Reallocation</span>
            </a>
          </div>
        </div>
          
        <a href="./Blog_Post.html" class="nav-item" data-admin-only>
          <i class="bi bi-journal-text"></i>
          <span class="menu-text">Blog Post</span>
        </a>
          
        <a href="../Auth/Login.html" class="nav-item logout">
          <i class="bi bi-box-arrow-right"></i>
          <span class="menu-text">Logout</span>
        </a>
          
        <div class="last-login">
          <p>Last Login</p>
          <p id="lastLoginValue">Loading...</p>
        </div>
          
      </nav>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex justify-center items-center">

      <div class="form-container">

        <div class="form-header">
          <h1>
            <img src="../../Images/KMD Logo.jpg"> College
          </h1>
          <p>Create User Account</p>
        </div>

        <form id="registerForm">

          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter full name">
            <p id="nameError"></p>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
            <p id="emailError"></p>
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phNum" placeholder="Enter phone number">
            <p id="phoneError"></p>
          </div>

          <!-- ROLE -->
          <div class="input-group">
            <label>Role</label>
            <select id="role">
              <option value="" disabled selected>Select Role</option>
              <option value="student">Student</option>
              <option value="tutor">Tutor</option>
              <option value="staff">Staff</option>
            </select>
            <p id="roleError"></p>
          </div>

          <!-- PROGRAM -->
          <div id="programContainer" class="input-group hidden">
            <label>Program</label>
            <select id="program">
              <option value="" disabled selected>Select program</option>
              <option>Computer Science</option>
              <option>Business</option>
              <option>Engineering</option>
              <option>Foundation</option>
            </select>
            <p id="programError"></p>
          </div>

          <!-- STAFF TYPE -->
          <div id="staffTypeContainer" class="input-group hidden">
            <label>Staff Type</label>
            <select id="staffType">
              <option value="" disabled selected>Select staff</option>
              <option value="normal">Staff</option>
              <option value="authorised">Authorised Staff</option>
            </select>
            <p id="staffTypeError"></p>
          </div>

          <!-- DEPARTMENT -->
          <div id="departmentContainer" class="input-group hidden">
            <label>Department</label>
            <select id="department">
              <option value="" disabled selected>Select department</option>
              <option>Computer Science</option>
              <option>Business</option>
              <option>Engineering</option>
            </select>
            <p id="departmentError"></p>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
            <p id="passwordError"></p>
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Enter the same password">
            <p id="confirmPasswordError"></p>
          </div>

          <p id="createUserStatus" class="text-sm mb-2"></p>
          <button type="submit" id="createUserBtn" class="submit-btn">Create</button>

        </form>

      </div>

    </div>

  </div>

</body>
</html>

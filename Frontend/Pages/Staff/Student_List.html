            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="doc-main">

            <!-- Search Bar -->
            <div class="search-bar">

                <select id="filterProgram">
                    <option value="all">All Programs</option>
                    <option value="Computing">Computing</option>
                    <option value="Business">Business</option>
                    <option value="Networking">Networking</option>
                    <option value="Cyber Security">Cyber Security</option>
                </select>
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Search by student name or program">

            </div>

            <!-- Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone Number</th>
                            <th>Program</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>

        </main>

    </div>

<script>

    document.querySelectorAll(".dropdown-toggle").forEach(item => {
        item.addEventListener("click", function () {
            const parent = this.parentElement;

            // Close others
            document.querySelectorAll(".dropdown").forEach(d => {
                if (d !== parent) {
                    d.classList.remove("active");
                }
            });

            // Toggle current
            parent.classList.toggle("active");
        });
    });
    
    /* Example student data */
    const students = [

        {
        name:"Yun Aeindary Oo",
        phone:"09123456789",
        program:"Computing",
        email:"yun@example.com",
        image:"../../Images/profile.jpg"
        },

        {
        name:"Hnin Yati",
        phone:"09987654321",
        program:"Business",
        email:"hnin@example.com",
        image:"../../Images/profile 2.jpg"
        },

        {
        name:"Tunn Lin Naing",
        phone:"09444555666",
        program:"Networking",
        email:"tunn@example.com",
        image:"../../Images/profile.jpg"
        },

        {
        name:"Kyaw San Lwin",
        phone:"09888777666",
        program:"Cyber Security",
        email:"kyaw@example.com",
        image:"../../Images/profile 2.jpg"
        },

        {
        name:"Sai Thiha Aung",
        phone:"09111222333",
        program:"Computing",
        email:"sai@example.com",
        image:"../../Images/profile.jpg"
        },

        {
        name:"Hein Khant Thura",
        phone:"09436677777",
        program:"Business",
        email:"hein@example.com",
        image:"../../Images/profile 2.jpg"
        }

    ];

    /* Display students */
    function displayStudents(){

        const table = document.getElementById("studentTable");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const filter = document.getElementById("filterProgram").value.toLowerCase();

        table.innerHTML = "";

        students.forEach(student => {

            if(!student.name.toLowerCase().includes(search) &&
            !student.program.toLowerCase().includes(search)) return;

            if(filter !== "all" && student.program.toLowerCase() !== filter) return;

            table.innerHTML += `

                <tr>
                    <td class="student-name">
                        <img src="${student.image}" class="student-avatar">
                        ${student.name}
                    </td>
                    <td>${student.phone}</td>
                    <td>${student.program}</td>
                    <td>${student.email}</td>
                </tr>

            `;

        });

    }

    /* Search event */
    document.getElementById("searchInput").addEventListener("keyup", displayStudents);

    /* Filter event */
    document.getElementById("filterProgram").addEventListener("change", displayStudents);

    /* Initial display */
    displayStudents();

</script>

</body>

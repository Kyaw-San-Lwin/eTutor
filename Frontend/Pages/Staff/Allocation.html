        <main class="doc-main">

        <!-- Search & Filter -->
        <div class="search-bar mb-4 flex gap-2 items-center">
            <select id="filterProgram" class="search-filter">
                <option value="all">All Programs</option>
                <option value="Computing">Computing</option>

                <option value="Cyber Security">Cyber Security</option>

            <div class="search-input-container flex-1 relative">

        <!-- Assign Button -->
        <button onclick="openModalMultiple()" class="confirm-btn mb-4">Assign Tutor to Selected</button>

        <!-- Student Table -->

        </div>

            <!-- ASSIGN MODAL -->
            <div id="assignModal" class="modal hidden">

                    <!-- Student Info -->
                    <div class="mb-4">

                            <option>Moe Pale</option>
                            <option>Moe Thant Oo</option>
                            <option>Aye Aye Kyaw</option>
                            <option>Hein Sithu Nyunt</option>
                        </select>
                    </div>

                    <!-- Buttons -->
                    <div class="flex justify-end gap-3">
                        <button onclick="closeModal()" class="cancel-btn">Cancel</button>
                        <button onclick="confirmAssign()" class="confirm-btn">Confirm</button>
                    </div>

                </div>
            </div>
        </div>
    </main>
</div>

<script>

    document.querySelectorAll(".dropdown-toggle").forEach(item => {
        item.addEventListener("click", function () {
            const parent = this.parentElement;

            // Close others
            document.querySelectorAll(".dropdown").forEach(d => {
                if (d !== parent) {
                    d.classList.remove("active");
                }
            });

            // Toggle current
            parent.classList.toggle("active");
        });
    });

    /* Example student data */
    const students = [
        {
            name:"Yun Aeindary Oo",
            program:"Computing",
            year:"Year 1",
            image:"../../Images/profile.jpg"
        },
        {
            name:"Hnin Yati",
            program:"Business",
            year:"Year 2",
            image:"../../Images/profile 2.jpg"
        },
        {
            name:"Tunn Lin Naing",
            program:"Networking",
            year:"Year 1",
            image:"../../Images/profile.jpg"
        },
        {
            name:"Kyaw San Lwin",
            program:"Cyber Security",
            year:"Year 3",
            image:"../../Images/profile 2.jpg"
        },
        {
            name:"Sai Thiha Aung",
            program:"Computing",
            year:"Year 2",
            image:"../../Images/profile.jpg"
        },
        {
            name:"Hein Khant Thura",
            program:"Business",
            year:"Year 1",
            image:"../../Images/profile 2.jpg"
        }
    ];

    /* Display students */
    function displayStudents(){

        const table = document.getElementById("studentTable");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const filter = document.getElementById("filterProgram").value.toLowerCase();

        table.innerHTML = "";

        students.forEach(student => {

            if(!student.name.toLowerCase().includes(search) &&
            !student.program.toLowerCase().includes(search)) return;

            if(filter !== "all" && student.program.toLowerCase() !== filter) return;

            table.innerHTML += `
                <tr>
                    <td class="student-name">
                        <img src="${student.image}" class="student-avatar">
                        ${student.name}
                    </td>
                    <td>${student.program}</td>
                    <td>${student.year}</td>
                    <td>
                        <button class="assign-btn" onclick="openModal('${student.name}','${student.program}')">Assign</button>
                    </td>
                </tr>
            `;

        });

    }

    /* Search event */
    document.getElementById("searchInput").addEventListener("keyup", displayStudents);

    /* Filter event */
    document.getElementById("filterProgram").addEventListener("change", displayStudents);

    /* Initial display */
    displayStudents();

    let currentStudentIndex = null;

    function openModal(name, program){
        document.getElementById("assignModal").classList.remove("hidden");

        document.getElementById("modalName").textContent = name;
        document.getElementById("modalProgram").textContent = program;
    }

    function closeModal(){
        document.getElementById("assignModal").classList.add("hidden");
    }

    function confirmAssign(){

        const tutor = document.getElementById("tutorSelect").value;

        if(tutor === ""){
            alert("Please select a tutor!");
            return;
        }

        alert("Tutor assigned successfully!");

        closeModal();
    }

</script>

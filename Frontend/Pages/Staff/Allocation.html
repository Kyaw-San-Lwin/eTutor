<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tutor Allocation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Allocation.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg" alt="Logo">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">
                <a href="./Staff_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>
                <a href="./Staff_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>
                <a href="./Edit_Profile.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>
                <a href="../Auth/Register.html" class="nav-item">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Create Account</span>
                </a>

                <!-- USERS DROPDOWN -->
                <div class="dropdown">
                    <div class="nav-item dropdown-toggle">
                        <i class="bi bi-people-fill"></i>
                        <span class="menu-text">Users</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>
                    <div class="dropdown-menu">
                        <a href="./Student_List.html">
                            <i class="bi bi-person"></i>
                            <span class="menu-text">Students</span>
                        </a>
                        <a href="./Tutor_List.html">
                            <i class="bi bi-person-badge"></i>
                            <span class="menu-text">Tutors</span>
                        </a>
                    </div>
                </div>

                <!-- PERSONAL TUTOR DROPDOWN -->
                <div class="dropdown">
                    <div class="nav-item active dropdown-toggle">
                        <i class="bi bi-chat-left-dots"></i>
                        <span class="menu-text">Personal Tutor</span>
                        <i class="bi bi-chevron-down arrow"></i>
                    </div>
                    <div class="dropdown-menu">
                        <a href="./Allocation.html">
                            <i class="bi bi-diagram-3"></i>
                            <span class="menu-text">Tutor Allocation</span>
                        </a>
                        <a href="./Reallocation.html">
                            <i class="bi bi-arrow-repeat"></i>
                            <span class="menu-text">Tutor Reallocation</span>
                        </a>
                    </div>
                </div>

                <!-- Placeholder for admin-only dropdown -->
                <div id="admin-reports-placeholder"></div>

                <a href="./Blog_Post.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>
            </nav>

        </aside>

        <!-- MAIN -->
        <main class="doc-main">

            <h1 class="text-xl font-bold">Tutor Allocation</h1>
            <h2 class="text-l font">Assign appropiate tutor to student!</h2>

            <!-- SEARCH + MULTI ASSIGN IN SAME ROW -->
            <div class="search-assign-container w-full max-w-[1000px] flex justify-between items-center mb-4">
                <!-- SEARCH BAR -->
                <div class="search-bar flex-1 mr-4">
                    <select id="filterProgram">
                        <option value="all">All Programs</option>
                        <option value="Computing">Computing</option>
                        <option value="Business">Business</option>
                        <option value="Networking">Networking</option>
                        <option value="Cyber Security">Cyber Security</option>
                    </select>

                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by student name or program">
                </div>

                <!-- MULTI ASSIGN BUTTON -->
                <button onclick="openModalMultiple()" class="multi-assign-btn">
                    Assign Selected
                </button>
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll"></th>
                            <th>Name</th>
                            <th>Program</th>
                            <th>Year</th>
                            <th>Tutor</th>
                        </tr>
                    </thead>

                    <tbody id="studentTable"></tbody>
                </table>
            </div>

            <!-- MODAL -->
            <div id="assignModal" class="modal hidden">
                <div class="modal-content">

                    <h2 class="text-lg font-semibold mb-3">Assign Tutor</h2>

                    <div id="selectedStudentsList" class="mb-4 text-sm"></div>

                    <select id="tutorSelect" class="w-full p-2 border rounded mb-4">
                        <option value="" disabled selected>Select Tutor</option>
                        <option>Moe Pale</option>
                        <option>Moe Thant Oo</option>
                        <option>Aye Aye Kyaw</option>
                    </select>

                    <div class="flex justify-end gap-2">
                        <button onclick="closeModal()" class="cancel-btn">Cancel</button>
                        <button onclick="confirmAssign()" class="confirm-btn">Confirm</button>
                    </div>

                </div>
            </div>

        </main>

    </div>

<script>

    document.addEventListener("DOMContentLoaded", function() {

        const sidebar = document.querySelector(".sidebar");

        sidebar.addEventListener("click", function(e) {
            const toggle = e.target.closest(".dropdown-toggle");

            if (toggle) {
                e.stopPropagation(); // prevent conflicts

                const parent = toggle.parentElement;

                // Close others
                document.querySelectorAll(".sidebar .dropdown").forEach(d => {
                    if (d !== parent) d.classList.remove("active");
                });

                parent.classList.toggle("active");
            }
        });

        // Click outside closes all
        document.addEventListener("click", function(e) {
            if (!e.target.closest(".sidebar")) {
                document.querySelectorAll(".sidebar .dropdown")
                    .forEach(d => d.classList.remove("active"));
            }
        });

        /* ADMIN REPORTS */
        const userRole = "admin";

        if (userRole === "admin") {
            const placeholder = document.getElementById("admin-reports-placeholder");

            const reportsDropdown = document.createElement("div");
            reportsDropdown.classList.add("dropdown");
            reportsDropdown.innerHTML = `
                <div class="nav-item dropdown-toggle">
                    <i class="bi bi-file-bar-graph"></i>
                    <span class="menu-text">Reports</span>
                    <i class="bi bi-chevron-down arrow"></i>
                </div>
                <div class="dropdown-menu">
                    <a href="./Exception_Report.html">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span class="menu-text">Exception Report</span>
                    </a>
                    <a href="./Statistical_Report.html">
                        <i class="bi bi-bar-chart-line"></i>
                        <span class="menu-text">Statistical Report</span>
                    </a>
                </div>
            `;
            placeholder.replaceWith(reportsDropdown);
        }

    });

    /* ================= DATA ================= */
    const students = [
        {name:"Yun Aeindary Oo", program:"Computing", year:"Year 1", image:"../../Images/profile.jpg"},
        {name:"Hnin Yati", program:"Business", year:"Year 2", image:"../../Images/profile 2.jpg"},
        {name:"Tunn Lin Naing", program:"Networking", year:"Year 1", image:"../../Images/profile.jpg"},
        {name:"Kyaw San Lwin", program:"Cyber Security", year:"Year 3", image:"../../Images/profile 2.jpg"}
    ];

    let selectedStudents = [];

    /* ================= DISPLAY ================= */
    function displayStudents(){

        const table = document.getElementById("studentTable");
        const search = document.getElementById("searchInput").value.toLowerCase();
        const filter = document.getElementById("filterProgram").value.toLowerCase();

        table.innerHTML = "";

        students.forEach((s, index) => {

            if(!s.name.toLowerCase().includes(search) &&
            !s.program.toLowerCase().includes(search)) return;

            if(filter !== "all" && s.program.toLowerCase() !== filter) return;

            table.innerHTML += `
            <tr>
                <td><input type="checkbox" class="student-checkbox" value="${s.name}"></td>

                <td class="student-name">
                    <img src="${s.image}" class="student-avatar">
                    ${s.name}
                </td>

                <td>${s.program}</td>
                <td>${s.year}</td>

                <td>
                    <button class="assign-btn" onclick="openModalSingle('${s.name}')">
                        Assign
                    </button>
                </td>
            </tr>
            `;
        });
    }

    /* ================= SELECT ALL ================= */
    document.getElementById("selectAll").addEventListener("change", function(){
        document.querySelectorAll(".student-checkbox").forEach(cb => {
            cb.checked = this.checked;
        });
    });

    /* ================= SINGLE ASSIGN ================= */
    function openModalSingle(name){
        selectedStudents = [name];

        document.getElementById("assignModal").classList.remove("hidden");

        document.getElementById("selectedStudentsList").innerHTML =
            `<strong>Student:</strong><br>• ${name}`;
    }

    /* ================= MULTIPLE ASSIGN ================= */
    function openModalMultiple(){

        selectedStudents = [...document.querySelectorAll(".student-checkbox:checked")]
            .map(cb => cb.value);

        if(selectedStudents.length === 0){
            alert("Please select at least one student!");
            return;
        }

        document.getElementById("assignModal").classList.remove("hidden");

        document.getElementById("selectedStudentsList").innerHTML =
            "<strong>Selected Students:</strong><br>" +
            selectedStudents.map(name => `• ${name}`).join("<br>");
    }

    /* ================= CLOSE ================= */
    function closeModal(){
        document.getElementById("assignModal").classList.add("hidden");
    }

    /* ================= CONFIRM ================= */
    function confirmAssign(){

        const tutor = document.getElementById("tutorSelect").value;

        if(!tutor){
            alert("Please select a tutor!");
            return;
        }

        alert("Tutor assigned successfully!");
        closeModal();
    }

    /* ================= EVENTS ================= */
    document.getElementById("searchInput").addEventListener("keyup", displayStudents);
    document.getElementById("filterProgram").addEventListener("change", displayStudents);

    /* INIT */
    displayStudents();

</script>

</body>
</html>

    <!-- Main -->
    <div class="flex-1 flex justify-center items-center">

      <div class="form-container">

        <div class="form-header">
          <h1>
            <img src="../../Images/KMD Logo.jpg"> College
          </h1>
          <p>Create User Account</p>
        </div>

        <form id="registerForm">

          <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter full name">
            <p id="nameError"></p>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter email">
            <p id="emailError"></p>
          </div>

          <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phNum" placeholder="Enter phone number">
            <p id="phoneError"></p>
          </div>

          <!-- ROLE -->
          <div class="input-group">
            <label>Role</label>
            <select id="role">
              <option value="" disabled selected>Select Role</option>
              <option>Student</option>
              <option>Tutor</option>
              <option>Staff</option>
            </select>
          </div>

          <!-- PROGRAM -->
          <div id="programContainer" class="input-group hidden">
            <label>Program</label>
            <select id="program">
              <option value="" disabled selected>Select program</option>
              <option>Computer Science</option>
              <option>Business</option>
              <option>Engineering</option>
              <option>Foundation</option>
            </select>
          </div>

          <!-- STAFF TYPE -->
          <div id="staffTypeContainer" class="input-group hidden">
            <label>Staff Type</label>
            <select id="staffType">
              <option value="" disabled selected>Select staff</option>
              <option>Staff</option>
              <option>Authorised Staff</option>
            </select>
          </div>

          <!-- DEPARTMENT -->
          <div id="departmentContainer" class="input-group hidden">
            <label>Department</label>
            <select id="department">
              <option value="" disabled selected>Select department</option>
              <option>Computer Science</option>
              <option>Business</option>
              <option>Engineering</option>
            </select>
          </div>

          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
          </div>

          <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Enter the same password">
          </div>

          <button class="submit-btn">Create</button>

        </form>

      </div>

    </div>

  </div>

<script>

  document.querySelectorAll(".dropdown-toggle").forEach(item => {
    item.addEventListener("click", function () {
      const parent = this.parentElement;

      document.querySelectorAll(".dropdown").forEach(d => {
        if (d !== parent) d.classList.remove("active");
      });

      parent.classList.toggle("active");
    });
  });

  const roleSelect = document.getElementById("role");
  const programContainer = document.getElementById("programContainer");
  const staffTypeContainer = document.getElementById("staffTypeContainer");
  const deptContainer = document.getElementById("departmentContainer");

  roleSelect.addEventListener("change", function () {
    const role = roleSelect.value;

    programContainer.classList.add("hidden");
    staffTypeContainer.classList.add("hidden");
    deptContainer.classList.add("hidden");

    if (role === "Student" || role === "Tutor") {
      programContainer.classList.remove("hidden");
    }

    if (role === "Staff") {
      staffTypeContainer.classList.remove("hidden");
      deptContainer.classList.remove("hidden");
    }
  });

  document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let valid = true;

    document.getElementById("nameError").textContent = "";
    document.getElementById("emailError").textContent = "";

    if (name === "") {
      document.getElementById("nameError").textContent = "Please enter your name!";
      valid = false;
    }

    if (!email.includes("@")) {
      document.getElementById("emailError").textContent = "Please enter valid email!";
      valid = false;
    }

    if (password.length < 6) {
      valid = false;
    }

    if (password !== confirmPassword) {
      valid = false;
    }

    if (!valid) return;

    alert("User created!");
  });
    
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KMD Tutor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/login-page.js"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Title -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-indigo-700 flex items-center justify-center gap-2">
        <img src="../../Images/KMD Logo.jpg" class="w-30 h-20 object-contain"> College
      </h1>

      <p class="text-gray-500 text-sm">Login to your account</p>
    </div>

    <!-- Form -->
    <form id="loginForm">

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Username or Email</label>
        <input type="text" id="loginUsernameEmail" placeholder="Enter your Username or Email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <p id="loginUsernameEmailError" class="text-red-500 text-sm"></p>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your Password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <p id="loginPasswordError" class="text-red-500 text-sm"></p>
      </div>

      <!-- Button -->
      <button id="loginSubmitBtn" type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2 mt-2">
        Login <i class="bi bi-box-arrow-in-right text-lg"></i>
      </button>
      <p id="loginError" class="text-red-500 text-sm mt-3 text-center"></p>

    </form>

  </div>
</body>
</html>

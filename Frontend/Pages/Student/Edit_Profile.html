<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Css/Sidebar.css">
    <link rel="stylesheet" href="../../Css/Edit_Profile.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="../../assets/js/core/config.js"></script>
    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/apiClient.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/features/edit-profile-page.js"></script>
</head>

<body class="bg-gray-200 font-sans" data-profile-mode="student-edit">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="sidebar bg-white border-r">

            <div class="logo-container">
                <img src="../../Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="./Student_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="./Student_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="./Edit_Profile.html" class="nav-item active">
                    <i class="bi bi-pencil-square"></i>
                    <span class="menu-text">Edit Profile</span>
                </a>

                <a href="./Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-fill"></i>
                    <span class="menu-text">Tutor</span>
                </a>

                <a href="./Meeting.html" class="nav-item">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="./Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="./Blog_Post.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="./Document.html" class="nav-item">
                    <i class="bi bi-upload"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="./Comment.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Comment</span>
                </a>

                <a href="../Auth/Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p id="lastLoginValue">Loading...</p>
                </div>

            </nav>
        </aside>

        <!-- Main Content -->
        <main class="edit-main">

            <!-- Edit Profile Card -->
            <div class="edit-card">

                <h2 class="edit-title">Edit Profile</h2>

                <!-- Upload Photo -->
                <div class="photo-upload">

                    <div class="icon-container">

                        <div class="profile-circle">
                            <i class="bi bi-camera" id="defaultIcon"></i>
                            <img id="profilePreview" src="" style="display:none;">
                        </div>

                        <label for="uploadImage" class="plus-icon">
                            <i class="bi bi-plus"></i>
                        </label>

                    </div>

                    <p>Upload Profile Photo</p>
                    <input type="file" id="uploadImage" accept="image/*">

                </div>

                <!-- Email -->
                <div class="input-group">
                    <label>Email</label>
                    <input id="profileEmail" type="email" value="" readonly>
                </div>

                <!-- Phone -->
                <div class="input-group">
                    <label>Phone Number</label>
                    <input id="profilePhone" type="text" placeholder="Enter your Phone Number">
                </div>
                <p id="profileEditMessage" class="text-sm mt-2"></p>

                <button id="profileSaveBtn" class="save-btn">Save</button>

            </div>

            <!-- Change Password Card -->
            <div class="edit-card" id="passwordChange">

                <h2 class="edit-title">Change Password</h2>

                <div class="input-group">
                    <label>Old Password</label>
                    <input id="currentPassword" type="password" placeholder="Enter your Old Password">
                </div>

                <div class="input-group">
                    <label>New Password</label>
                    <input id="newPassword" type="password" placeholder="Enter your New Password">
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Enter your Confirm Password">
                </div>
                <p id="passwordChangeMessage" class="text-sm mt-2"></p>

                <button id="passwordSaveBtn" class="save-btn">Save</button>

            </div>

        </main>

    </div>
</body>

</html>

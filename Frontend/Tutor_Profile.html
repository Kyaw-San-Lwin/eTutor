<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutor Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
  <link rel="stylesheet" href="Css/Tutor_Profile.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/core/apiClient.js"></script>
  <script src="assets/js/core/authGuard.js"></script>
  <script src="assets/js/core/components.js"></script>
</head>

<body class="bg-light">

  <div class="d-flex min-vh-100">

    <aside id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Profile Card -->
      <div class="profile-card">

        <h1 class="profile-title">Tutor Profile</h1>

        <!-- Profile Image -->
        <div class="profile-image-container">
          <img src="Images/profile 2.jpg" alt="Profile Image" class="profile-image">
        </div>

        <!-- Name -->
        <h2 class="profile-name">Moe Thant Oo</h2>

        <!-- Information Row -->
        <div class="info-grid">
          <div class="info-item">
            <p class="info-label">Phone Number</p>
            <p class="info-value">09123456789</p>
          </div>

          <div class="info-item">
            <p class="info-label">Email</p>
            <p class="info-value">example@gmail.com</p>
          </div>

          <div class="info-item">
            <p class="info-label">Subject</p>
            <p class="info-value">Enterprise Web Software Development</p>
          </div>
        </div>

        <!-- Department -->
        <div class="department">
          <p class="info-label">Department</p>
          <p class="info-value">Computing</p>
        </div>

      </div>

    </main>
  </div>

  <script>
    requireAuth();
    loadSidebar("student");
  </script>

</body>
</html>

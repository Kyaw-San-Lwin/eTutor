<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KMD Tutor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="assets/js/core/config.js"></script>
    <script src="assets/js/core/storage.js"></script>
    <script src="assets/js/core/apiClient.js"></script>
    <script src="assets/js/api/auth.js"></script>
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="w-100 bg-white rounded-4 shadow p-4 p-md-5" style="max-width: 28rem;">

    <!-- Title -->
    <div class="text-center mb-4">
      <h1 class="h3 fw-bold text-primary d-flex align-items-center justify-content-center gap-2">
        <img src="Images/KMD Logo.jpg" style="height: 3rem; width: auto;" alt="Logo"> College
      </h1>

      <p class="text-secondary small mb-0">Login to your account</p>
    </div>

    <!-- Form -->
    <form id="loginForm">

      <!-- Email -->
      <div class="mb-4">
        <label class="form-label text-secondary" for="loginUsernameEmail">Username or Email</label>
        <input type="text" id="loginUsernameEmail" placeholder="Enter your Username or Email" class="form-control">
        <p id="loginUsernameEmailError" class="text-danger small mb-0"></p>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label text-secondary" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your Password" class="form-control">
        <p id="loginPasswordError" class="text-danger small mb-0"></p>
      </div>

      <!-- Remember + Forgot -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="#" class="text-primary text-decoration-none">Forgot password?</a>
      </div>

      <!-- Button -->
      <button class="w-100 btn btn-primary d-flex align-items-center justify-content-center gap-2" style="background-color:#4f46e5;border-color:#4f46e5;">
        Login <i class="bi bi-box-arrow-in-right"></i>
      </button>
      <p id="loginError" class="text-danger small mt-3 text-center"></p>

    </form>

  </div>

    <script>
      document.getElementById("loginForm").addEventListener("submit", async function(e){
        e.preventDefault();

        let usernameEmail = document.getElementById("loginUsernameEmail").value.trim();
        let password = document.getElementById("loginPassword").value.trim();
        let usernameEmailError = document.getElementById("loginUsernameEmailError");
        let passwordError = document.getElementById("loginPasswordError");
        let loginError = document.getElementById("loginError");

        usernameEmailError.textContent = "";
        passwordError.textContent = "";
        loginError.textContent = "";

        let valid = true;

        if (usernameEmail === "") {
          usernameEmailError.textContent = "Enter a valid Username or Email!";
          valid = false;
        }

        if (password === "") {
          passwordError.textContent = "Enter a valid Password!";
          valid = false;
        }

        if (!valid) return;

        try {
          await loginUser(usernameEmail, password);
        } catch (err) {
          loginError.textContent = err.message || "Login failed";
        }
      });
    </script>

</body>
</html>

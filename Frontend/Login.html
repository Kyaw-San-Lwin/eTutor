<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KMD Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="Css/bootstrap-custom.css">
    <link rel="stylesheet" href="Css/Login.css">
</head>

<body class="login-page">

  <div class="login-card">

    <!-- Title -->
    <div class="text-center mb-4">
      <div class="brand-row">
        <img src="Images/KMD Logo.jpg" class="brand-logo" alt="KMD Logo">
        <span class="brand-text">College</span>
      </div>
      <p class="login-subtitle">Login your account</p>
    </div>

    <!-- Form -->
    <form id="loginForm">

      <!-- Email -->
      <div class="mb-3">
        <label for="loginUsernameEmail" class="form-label visually-hidden">Username or Email</label>
        <input type="text" id="loginUsernameEmail" placeholder="Write your User Name or Email here" class="form-control login-input">
        <p id="loginUsernameEmailError" class="u-text-red-500 u-text-sm"></p>
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label for="loginPassword" class="form-label visually-hidden">Password</label>
        <input type="password" id="loginPassword" placeholder="Write your Password here" class="form-control login-input">
        <p id="loginPasswordError" class="u-text-red-500 u-text-sm"></p>
      </div>

      <!-- Remember + Forgot -->
      <div class="mb-4">
        <a href="#" class="forgot-link">Forgot password ?</a>
      </div>

      <!-- Button -->
      <button class="btn login-btn w-100 d-flex align-items-center justify-content-center gap-2">
        Login <i class="bi bi-box-arrow-in-right"></i>
      </button>
      <p id="loginError" class="u-text-red-500 u-text-sm mt-3 text-center"></p>

    </form>

  </div>

    <script>
      document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      let usernameEmail = document.getElementById("loginUsernameEmail").value.trim();
      let password = document.getElementById("loginPassword").value.trim();
      let usernameEmailError = document.getElementById("loginUsernameEmailError");
      let passwordError = document.getElementById("loginPasswordError");
      let loginError = document.getElementById("loginError");

      usernameEmailError.textContent = "";
      passwordError.textContent = "";
      loginError.textContent = "";

      let valid = true;

      // Username & Email validation
      if (!usernameEmail.includes("@")) {
        usernameEmailError.textContent = "Enter a valid Username or Email!";
        valid = false;
      }

      // Password validation
      if (password == "") {
        passwordError.textContent = "Enter a valid Password!";
        valid = false;
      }

      if (!valid) return;

      trueUsernameEmail = "yunaeindaryoo@gmail.com";
      truePassword = "kmd123";
      if (usernameEmail == trueUsernameEmail && password == truePassword) {
        alert("Login successful!");
        window.location.href = "Student_Dashboard.html";
      }
      else {
        loginError.textContent = "No registered user found!";
        return;
      }

      });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - KMD Tutor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/core/apiClient.js"></script>
  <script src="assets/js/core/authGuard.js"></script>
  <script src="assets/js/core/components.js"></script>
</head>

<body class="bg-light">

  <div class="d-flex min-vh-100">

    <aside id="sidebar"></aside>

    <!-- Main Content -->
    <div class="d-flex-grow-1 d-flex justify-content-center align-items-center">

      <!-- Form Container -->
      <div class="w-100 bg-white rounded-3 shadow p-4 p-md-5 my-4" style="max-width: 28rem;">

        <!-- Title -->
        <div class="text-center mb-4">
            <h1 class="fs-3 fw-bold text-primary d-flex align-items-center justify-content-center gap-2">
                <img src="Images/KMD Logo.jpg" style="height:3rem;width:auto;" alt="Logo"> College
            </h1>
            <p class="text-secondary small">Create User Account</p>
        </div>

        <!-- Form -->
        <form id="registerForm">

          <!-- Full Name -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter Full Name" class="form-control">
            <p id="nameError" class="text-danger small"></p>
          </div>

          <!-- Email -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Email" class="form-control">
            <p id="emailError" class="text-danger small"></p>
          </div>

          <!-- Phone Number -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="phNum">Phone Number</label>
            <input type="text" id="phNum" placeholder="Enter Phone Number" class="form-control">
            <p id="emailError" class="text-danger small"></p>
          </div>

          <!-- Role -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="role">Select Role</label>
            <select id="role" class="form-select">
              <option>Student</option>
              <option>Tutor</option>
              <option>Admin</option>
            </select>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" class="form-control">
            <p id="passwordError" class="text-danger small"></p>
          </div>

          <!-- Confirm Password -->
          <div class="mb-4">
            <label class="form-label text-secondary" for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Enter Confirm password" class="form-control">
            <p id="confirmError" class="text-danger small"></p>
          </div>

          <!-- Button -->
          <button class="btn btn-primary w-100" style="background-color:#0054a7;border-color:#0054a7;"> Create <i class="bi bi-box-arrow-in-right fs-5"></i> </button>

        </form>

      </div>

    </div>

  </div>

  <script>
    requireAuth();
    loadSidebar("staff");

    document.getElementById("registerForm").addEventListener("submit", function(e){
      e.preventDefault();

      let name = document.getElementById("name").value.trim();
      let email = document.getElementById("email").value.trim();
      let role = document.getElementById("role").value;
      let password = document.getElementById("password").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      let valid = true;

      // Reset errors
      document.getElementById("nameError").textContent = "";
      document.getElementById("emailError").textContent = "";
      document.getElementById("passwordError").textContent = "";
      document.getElementById("confirmError").textContent = "";

      // Name validation
      if (name === "") {
        document.getElementById("nameError").textContent = "Please enter your name!";
        valid = false;
      }

      // Email validation
      if (!email.includes("@")) {
        document.getElementById("emailError").textContent = "Please enter valid email!";
        valid = false;
      }

      // Password validation
      if (password.length < 6) {
        document.getElementById("passwordError").textContent = "Password must be at least 6 characters!";
        valid = false;
      }

      // Confirm password
      if (password !== confirmPassword) {
        document.getElementById("confirmError").textContent = "Passwords do not match!";
        valid = false;
      }

      if (!valid) return;

      // Save user (for demo purposes)
      let user = {
        name: name,
        email: email,
        role: role,
        password: password
      };

      alert("User account created successfully!");
      window.location.href = "Register.html";
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="Css/Sidebar.css">
    <link rel="stylesheet" href="Css/Meeting.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-sans">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="sidebar bg-white border-r">

            <!-- Logo -->
            <div class="logo-container">
                <img src="Images/KMD Logo.jpg">
                <h1 class="logo-text">College</h1>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 p-4 space-y-1 text-black">

                <a href="Tutor_Dashboard.html" class="nav-item">
                    <i class="bi bi-tv"></i>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="Tutor_Profile.html" class="nav-item">
                    <i class="bi bi-person-circle"></i>
                    <span class="menu-text">Profile</span>
                </a>

                <a href="Student_List.html" class="nav-item">
                    <i class="bi bi-people-fill"></i>
                    <span class="menu-text">Students</span>
                </a>

                <a href="Tutor_Meeting.html" class="nav-item active">
                    <i class="bi bi-camera-video"></i>
                    <span class="menu-text">Meeting</span>
                </a>

                <a href="Tutor_Messaging.html" class="nav-item">
                    <i class="bi bi-chat-left-dots"></i>
                    <span class="menu-text">Message</span>
                </a>

                <a href="Tutor_Blog.html" class="nav-item">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">Blog Post</span>
                </a>

                <a href="Tutor_Document.html" class="nav-item">
                    <i class="bi bi-file-earmark-arrow-down"></i>
                    <span class="menu-text">Document</span>
                </a>

                <a href="Login.html" class="nav-item logout">
                    <i class="bi bi-box-arrow-right"></i>
                    <span class="menu-text">Logout</span>
                </a>

                <div class="last-login">
                    <p>Last Login</p>
                    <p>03/07/26</p>
                </div>

            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="meeting-main flex-1 p-10">

            <!-- Upload Meeting Section -->
            <div class="meeting-upload">

                <textarea id="meetingMessage" placeholder="Write meeting message or Teams link..."></textarea>

                <button onclick="postMeeting()" class="post-btn">
                    <i class="bi bi-upload"></i> Post Meeting
                </button>

            </div>

            <!-- Meeting Post Card -->
            <div id="meetingContainer">

                <!-- Meeting Post Card -->
                <div class="meeting-card">
                
                    <div class="flex items-center gap-4 mb-4">
                        <img src="Images/profile 2.jpg" class="profile-pic">
                        <div>
                            <p class="tutor-name">Moe Thant Oo</p>
                            <p class="tutor-email">example@gmail.com</p>
                        </div>
                    </div>

                    <div class="message-section">
                        <p class="message-text">We will meet at 1:20 PM today!</p>
                        <p class="message-time">Sent: 09/03/2026 12:45 PM</p>
                    </div>

                </div>

            </div>

        </main>

<script>

function postMeeting(){

    const message = document.getElementById("meetingMessage").value;

    if(message.trim() === ""){
        alert("Please enter a meeting message");
        return;
    }

    const container = document.getElementById("meetingContainer");

    const now = new Date();

    const date = now.toLocaleDateString();
    const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const card = document.createElement("div");
    card.className = "meeting-card";

    card.innerHTML = `

        <div class="flex items-center gap-4 mb-4">
            <img src="Images/profile 2.jpg" class="profile-pic">
            <div>
                <p class="tutor-name">Moe Thant Oo</p>
                <p class="tutor-email">example@gmail.com</p>
            </div>
        </div>

        <div class="message-section">
            <p class="message-text">${message}</p>
            <p class="message-time">Sent: ${date} ${time}</p>
        </div>

    `;

    container.prepend(card);

    document.getElementById("meetingMessage").value = "";

}

</script>

</body>
</html>

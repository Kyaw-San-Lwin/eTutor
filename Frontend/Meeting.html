<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Css/Sidebar.css">
  <link rel="stylesheet" href="Css/Meeting.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="assets/js/core/config.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/core/apiClient.js"></script>
  <script src="assets/js/core/authGuard.js"></script>
  <script src="assets/js/core/components.js"></script>
  <script src="assets/js/api/meeting.js"></script>
</head>

<body class="bg-light">

    <div class="d-flex min-vh-100">

        <aside id="sidebar"></aside>

        <!-- Main Content -->
        <main class="meeting-main flex-grow-1 p-4">
            <div id="meetingList"></div>
        </main>
</div>

<script>
  requireAuth();
  loadSidebar("student");

  function renderMeetings(items) {
    const container = document.getElementById("meetingList");
    container.innerHTML = "";
    items.forEach((m) => {
      const date = m.meeting_date || "";
      const time = m.meeting_time ? m.meeting_time.slice(0, 5) : "";
      const type = m.meeting_type || "meeting";
      const info = m.meeting_link ? `Link: ${m.meeting_link}` : (m.outcome || "");
      container.innerHTML += `
        <div class="meeting-card">
          <div class="d-flex align-items-center gap-4 mb-4">
            <img src="Images/profile 2.jpg" alt="Tutor Profile" class="profile-pic">
            <div>
              <p class="tutor-name">${type.toUpperCase()}</p>
              <p class="tutor-email">${date} ${time}</p>
            </div>
          </div>
          <div class="message-section">
            <p class="message-text">${info}</p>
            <p class="message-time">Status: ${m.status || "scheduled"}</p>
          </div>
        </div>
      `;
    });
  }

  async function refreshMeetings() {
    const res = await loadMeetings();
    if (!res || !res.success) return;
    renderMeetings(res.data || []);
  }

  refreshMeetings();
</script>

</body>
</html>
